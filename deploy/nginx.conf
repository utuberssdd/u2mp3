# ============================================================
#  U2MP3.COM — Nginx Configuration
#  Copy to: /etc/nginx/sites-available/u2mp3
#  Enable:  ln -s /etc/nginx/sites-available/u2mp3 /etc/nginx/sites-enabled/
#  Replace: YOUR_DOMAIN and YOUR_APP_DIR with real values
# ============================================================

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    root YOUR_APP_DIR/artifacts/yt-mp3/dist/public;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # Cache static assets for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy → Express server (port 4000)
    location /api/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Long timeout for MP3 streaming downloads (10 minutes)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # React SPA — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
