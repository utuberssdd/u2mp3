kind = "web"
previewPath = "/"
title = "YouTube to MP3 Downloader"
version = "1.0.0"
id = "artifacts/yt-mp3"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24923

[services.development]
run = "pnpm --filter @workspace/yt-mp3 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/yt-mp3", "run", "build" ]
publicDir = "artifacts/yt-mp3/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24923"
BASE_PATH = "/"
